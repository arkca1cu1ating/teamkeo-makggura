<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1P / 2P Sync Toggle Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }

    input {
      width: 190px;
      padding: 6px;
      font-size: 15px;
      text-align: center;
    }

    button {
      font-size: 18px;
      padding: 10px 18px;
      margin: 5px;
      cursor: pointer;
    }

    .role-button {
      min-width: 110px;
    }

    #app {
      display: none;
      margin-top: 30px;
    }

    .toggle-wrap {
      margin-top: 20px;
    }

    .toggle-btn {
      width: 150px;
      height: 70px;
      font-size: 24px;
      font-weight: bold;
      border: 2px solid #333;
      border-radius: 8px;
      color: white;
    }

    .toggle-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #myRoleText {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Room Key 입력</h2>
  <input id="room" placeholder="room key">
  <br>
  <button onclick="createRoom()">방 생성</button>
  <br>
  <button class="role-button" onclick="joinRoom('p1')">1P로 입장</button>
  <button class="role-button" onclick="joinRoom('p2')">2P로 입장</button>

  <div id="app">
    <h2 id="roomDisplay"></h2>
    <div id="myRoleText"></div>

    <div class="toggle-wrap">
      <button id="p1Btn" class="toggle-btn">1P OFF</button>
      <button id="p2Btn" class="toggle-btn">2P OFF</button>
    </div>
  </div>

  <!-- Firebase v8 SDK: 현재 script.js 방식(firebase.initializeApp, firebase.database)에 맞는 버전 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="script.js"></script>
</body>
</html>
