<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Sync Toggle Test</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    button { font-size: 20px; padding: 10px 20px; margin:5px; }
  </style>
</head>
<body>
  <h2>Room Key 입력</h2>
  <input id="room" placeholder="room key">
  <br>
  <button onclick="joinRoom()">입장</button>
  <button onclick="createRoom()">방 생성</button>

  <div id="app" style="display:none; margin-top:30px;">
    <h2 id="roomDisplay"></h2>
    <button id="toggle">OFF</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="script.js"></script>
</body>
</html>
