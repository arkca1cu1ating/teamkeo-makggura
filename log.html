<!DOCTYPE html>
<html>
<body>
<h2>로그</h2>
<div id="log"></div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig={apiKey:"YOUR_KEY",authDomain:"YOUR_DOMAIN",databaseURL:"YOUR_DB_URL",projectId:"YOUR_PROJECT_ID"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const params=new URLSearchParams(location.search);
const room=params.get('room');

if(room){
 db.ref('rooms/'+room).once('value').then(s=>{
  let d=s.val();
  document.getElementById('log').innerText=room+" 결과:"+d.win.role+" "+d.win.result;
 });
}
</script>
</body>
</html>
